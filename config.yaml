# ╔══════════════════════════════════════════════════════════════╗
# ║               Object Detection – Master Config              ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Model Selection ──────────────────────────────────────────
# model_type: "yolo" or "detr"
model_type: "yolo"

# ── YOLO Model ───────────────────────────────────────────────
# Pick any YOLO version. Run `python train_yolo.py --list_models`
# to see all options. Examples:
#
#   yolov3, yolov3-tiny
#   yolov5n, yolov5s, yolov5m, yolov5l, yolov5x
#   yolov6n, yolov6s, yolov6m, yolov6l
#   yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
#   yolov9t, yolov9s, yolov9m, yolov9c, yolov9e
#   yolov10n, yolov10s, yolov10m, yolov10l, yolov10x
#   yolo11n, yolo11s, yolo11m, yolo11l, yolo11x
#
# You can also pass a direct .pt path or URL.
yolo_model: "yolov8n"
yolo_task: "detect"         # detect | segment | classify | pose

# ── DETR Model ───────────────────────────────────────────────
# Pick any DETR-family variant. Run `python train_detr.py --list_models`
# to see all options. Examples:
#
#   detr-resnet-50             (original DETR)
#   detr-resnet-101
#   conditional-detr-resnet-50 (Conditional DETR)
#   deformable-detr            (Deformable DETR)
#   deta-swin-large            (DETA)
#   rt-detr-l, rt-detr-x       (RT-DETR via Ultralytics)
#   yolos-tiny, yolos-small, yolos-base  (YOLOS)
#
# You can also pass any HuggingFace model ID directly.
detr_model: "detr-resnet-50"
num_labels: 91              # number of object classes

# ── Dataset ──────────────────────────────────────────────────
# source: "huggingface" | "coco" | "yolo"
#
# ┌──────────────────────────────────────────────────────────┐
# │  OPTION 1 — HuggingFace dataset (auto-download)         │
# │                                                          │
# │  dataset:                                                │
# │    source: "huggingface"                                 │
# │    name: "cppe-5"              # any HF detection ds     │
# │    subset: ~                   # optional config/subset  │
# │    train_split: "train"                                  │
# │    val_split: "test"                                     │
# │    image_col: "image"                                    │
# │    objects_col: "objects"                                 │
# │    bbox_col: "bbox"                                      │
# │    category_col: "category"                              │
# │    bbox_format: "coco"        # coco | pascal_voc | yolo │
# │    output_dir: "./data_hf"                               │
# │    cache_dir: ~                                          │
# │    force_redownload: false                               │
# │                                                          │
# ├──────────────────────────────────────────────────────────┤
# │  OPTION 2 — COCO-JSON format (manual / local)           │
# │                                                          │
# │  dataset:                                                │
# │    source: "coco"                                        │
# │    root: "./data"                                        │
# │    train_ann: "./data/annotations/instances_train.json"  │
# │    val_ann: "./data/annotations/instances_val.json"      │
# │                                                          │
# ├──────────────────────────────────────────────────────────┤
# │  OPTION 3 — YOLO folder format (manual / local)         │
# │                                                          │
# │  dataset:                                                │
# │    source: "yolo"                                        │
# │    root: "./data"                                        │
# │    # images/train, images/val, labels/train, labels/val  │
# │                                                          │
# │  yolo_data: "./data/data.yaml"                           │
# └──────────────────────────────────────────────────────────┘

dataset:
  source: "yolo"
  root: "./coco8"
  train_split: "train"
  val_split: "val"
  image_col: "image"
  objects_col: "objects"
  bbox_col: "bbox"
  category_col: "category"
  bbox_format: "coco"
  output_dir: "./data_hf"

# Fallback path for YOLO model when using manual data.yaml
yolo_data: "coco8/coco8.yaml"

# ── Training Hyperparameters ─────────────────────────────────
epochs: 2
batch_size: 2
learning_rate: 0.0001
weight_decay: 0.0001
img_size: 640
num_workers: 4

# ── Device ───────────────────────────────────────────────────
# "auto" will pick GPU if available, else CPU
# Explicit: "cuda", "cuda:0", "cpu", "mps"
device: "auto"

# ── Weights & Biases ─────────────────────────────────────────
wandb:
  enabled: false
  project: "object-detection"
  entity: ~
  run_name: ~
  tags: []

# ── Checkpointing ───────────────────────────────────────────
output_dir: "./runs"
save_best: true
save_interval: 5

# ── Early Stopping ──────────────────────────────────────────
early_stopping:
  enabled: true
  patience: 10
  min_delta: 0.001

# ── Augmentation (YOLO only, optional) ──────────────────────
# augmentation:
#   hsv_h: 0.015
#   hsv_s: 0.7
#   hsv_v: 0.4
#   degrees: 0.0
#   translate: 0.1
#   scale: 0.5
#   flipud: 0.0
#   fliplr: 0.5
#   mosaic: 1.0
#   mixup: 0.0

# ── Inference ────────────────────────────────────────────────
inference:
  weights: "./runs/best.pt"
  source: "./test_images"
  conf_threshold: 0.25
  iou_threshold: 0.45
  save_results: true
  show_results: false

# ── ONNX Export ──────────────────────────────────────────────
export:
  format: "onnx"
  opset: 17
  dynamic_axes: true
  simplify: true
  input_shape: [1, 3, 640, 640]
